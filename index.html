<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Infinity Boutique Invoice</title>
<style>
/* Global */
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f4f4f4;
    padding: 20px;
}

/* Top Buttons */
.toolbar {
    margin-bottom: 20px;
}

.btn {
    background: #2e7d32;
    color: #fff;
    border: none;
    padding: 10px 14px;
    border-radius: 5px;
    cursor: pointer;
}

/* Invoice Container *

.invoice {
    max-width: 1200px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 40px;
    flex-wrap: wrap;
}

.logo {
    width: 140px;
    height: 140px;
    object-fit: contain;
}

/* Sections */
.section {
    border: 1px solid #ddd;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
}

/* Forms */
input,
select {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
}

/* Tables */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th,
td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

th {
    background: #2e7d32;
    color: #fff;
}
/* Product Images */
.item-preview {
    width: 70px;
    height: 70px;
    object-fit: cover;
}

/* Grid Layout */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
}

/* Print Settings */
@media print {

    .toolbar {
        display: none;
    }

    body {
        background: #fff;
        padding: 0;
    }

}
</style>
</head>
<body>
<div class="toolbar">
<button class="btn" onclick="window.print()">Print Invoice</button>
<button class="btn" onclick="newInvoice()">New Invoice</button>
</div>

<div class="invoice">
<div class="header">
<img class="logo" src="https://drive.google.com/thumbnail?id=1zF5e4k75SMfcJ6Jtl0_ik4lqOJPzUZKH&sz=w1000" alt="Logo">
<div>
<h1>Infinity Boutique's JP Online Shop</h1>
<p>Nagoya, Aichi, Japan</p>
<p>08094932346</p>
<p>harukana1369@gmail.com</p>
</div>
<div>
<label>Invoice No</label>
<input id="invoiceNo" value="INV-1001">
<label>Date</label>
<input type="date" id="invoiceDate">
</div>
</div>

<div class="section grid">
<div><label>Customer Name</label><input></div>
<div><label>Contact Number</label><input></div>
<div><label>Address</label><input></div>
<div><label>Status</label><input placeholder="Paid/Pending"></div>
</div>

<div class="section">
<label>Currency</label>
<select id="currency" onchange="updateTotals()">
<option value="¥">Japanese Yen (¥)</option>
<option value="₱">Philippine Peso (₱)</option>
</select>

<label>Payment Type</label>
<select id="paymentType" onchange="togglePaymentType()">
<option value="full">Full Payment</option>
<option value="layaway">Layaway</option>
</select>
</div>

<div class="section">
<table>
<thead><tr><th>Photo</th><th>Description</th><th>Rate</th><th>Qty</th><th>Amount</th><th>Action</th></tr></thead>
<tbody id="itemBody"></tbody>
</table>
<button class="btn" onclick="addItem()">Add Item</button>
</div>

<div class="section">
<h2>Total: <span id="cur">¥</span><span id="total">0.00</span></h2>
</div>

<div class="section" id="fullSection">
<label>Payment Received</label>
<input id="fullPay" type="number" value="0" oninput="updateTotals()">
<h3>Balance Due: <span id="cur2">¥</span><span id="fullBal">0.00</span></h3>
</div>

<div class="section" id="laySection" style="display:none">
<select id="downType" onchange="updateTotals()">
<option value="10">10%</option><option value="20">20%</option>
<option value="30">30%</option><option value="40">40%</option>
<option value="50">50%</option><option value="custom">Custom Amount</option>
</select>
<input id="customDown" type="number" value="0" placeholder="Custom Down Payment" oninput="updateTotals()">

<h3>Down Payment: <span id="cur3">¥</span><span id="down">0.00</span></h3>
<h3>Remaining: <span id="cur4">¥</span><span id="remain">0.00</span></h3>

<table>
<tr><th>#</th><th>Due Date</th><th>Amount</th><th>Status</th></tr>
<tr><td>1</td><td id="d1"></td><td><span id="cur5">¥</span><span id="m1">0.00</span></td><td><input></td></tr>
<tr><td>2</td><td id="d2"></td><td><span id="cur6">¥</span><span id="m2">0.00</span></td><td><input></td></tr>
<tr><td>3</td><td id="d3"></td><td><span id="cur7">¥</span><span id="m3">0.00</span></td><td><input></td></tr>
</table>
</div>
</div>

<script>
function addItem(){
let tr=document.createElement('tr');
tr.className='row';
tr.innerHTML=`<td><img class="item-preview"><input type="file" accept="image/*" onchange="preview(event,this)"></td><td><input></td><td><input class="rate" type="number" oninput="updateTotals()"></td><td><input class="qty" type="number" value="1" oninput="updateTotals()"></td><td><span class="amt">0.00</span></td><td><button onclick="this.closest('tr').remove();updateTotals()">Remove</button></td>`;
itemBody.appendChild(tr);
}
function preview(e,t){let f=e.target.files[0]; if(!f)return; let r=new FileReader(); r.onload=x=>t.parentElement.querySelector('img').src=x.target.result; r.readAsDataURL(f);}
function togglePaymentType(){let l=paymentType.value==='layaway'; laySection.style.display=l?'block':'none'; fullSection.style.display=l?'none':'block';}
function updateTotals(){
let total=0;
document.querySelectorAll('.row').forEach(r=>{let rate=parseFloat(r.querySelector('.rate').value)||0; let qty=parseFloat(r.querySelector('.qty').value)||0; let a=rate*qty; r.querySelector('.amt').innerText=a.toFixed(2); total+=a;});
document.getElementById('total').innerText=total.toFixed(2);
let c=currency.value;
['cur','cur2','cur3','cur4','cur5','cur6','cur7'].forEach(id=>document.getElementById(id).innerText=c);
fullBal.innerText=Math.max(0,total-(parseFloat(fullPay.value)||0)).toFixed(2);
let down=downType.value==='custom'?(parseFloat(customDown.value)||0):total*(parseFloat(downType.value)/100);
if(down>total) down=total;
let rem=total-down, inst=rem/3;
document.getElementById('down').innerText=down.toFixed(2);
document.getElementById('remain').innerText=rem.toFixed(2);
m1.innerText=inst.toFixed(2); m2.innerText=inst.toFixed(2); m3.innerText=inst.toFixed(2);
}
function dates(){let d=new Date(); for(let i=1;i<=3;i++){let x=new Date(d); x.setMonth(x.getMonth()+i); document.getElementById('d'+i).innerText=x.toLocaleDateString();}}
function newInvoice(){itemBody.innerHTML=''; addItem(); invoiceNo.value='INV-'+Math.floor(Math.random()*9000+1000); updateTotals(); dates();}
addItem(); dates(); updateTotals();
</script>
</body></html>
